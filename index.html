        <div style="opacity: 0.8; font-size: 0.9rem; letter-spacing: 1px;">2024/10/18 - 至今</div>
        <!-- 這裡會自動變成 561 天 (隨日期增加) -->
        <div class="main-days" id="live-days">載入中...</div> 
        <div class="sub-days" id="counter-display">第 0 天</div>
        <button class="btn-plus" id="plus-btn">+</button>
        <button id="card-btn" onclick="showCard()">查看我想對你說的話</button>

    <script>
        // ... 原有的 photoDays, photoIndex 等設定 ...

        // 加入這個自動計算函數
        function updateLiveDays() {
            const startDate = new Date("2024-10-18");
            const today = new Date();
            const timeDiff = today - startDate;
            const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            document.getElementById("live-days").innerText = daysDiff + " 天";
        }
        updateLiveDays(); // 執行它

        // ... 原有的 plusBtn 點擊邏輯 ...
    </script>
